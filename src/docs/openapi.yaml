openapi: 3.0.3
info:
  title: Document Batch API
  version: 1.0.0
  description: API for asynchronous batch PDF generation with queue, worker, health checks and metrics.
servers:
  - url: http://localhost:3000
  - url: https://test-back-nodejs.onrender.com
paths:
  /:
    get:
      summary: Root endpoint
      responses:
        "200":
          description: API welcome message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Welcome to the backend API
  /api/documents/batch:
    post:
      summary: Create a batch of documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userIds
              properties:
                userIds:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items:
                    type: string
            example:
              userIds: [user_0001, user_0002, user_0003]
      responses:
        "200":
          description: Batch created
          content:
            application/json:
              schema:
                type: object
                properties:
                  batchId:
                    type: string
        "400":
          description: Validation error
  /api/documents/batch/{batchId}:
    get:
      summary: Get batch status and documents
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-fA-F0-9]{24}$"
      responses:
        "200":
          description: Batch details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  statusCounts:
                    type: object
                    additionalProperties:
                      type: integer
                  data:
                    type: object
        "404":
          description: Batch not found
  /api/documents/{documentId}:
    get:
      summary: Download generated PDF document
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-fA-F0-9]{24}$"
      responses:
        "200":
          description: PDF stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "409":
          description: Document not generated yet
        "404":
          description: Document not found
  /health:
    get:
      summary: Health check (DB, Redis, queue)
      responses:
        "200":
          description: Healthy
        "503":
          description: Degraded
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Metrics output
          content:
            text/plain:
              schema:
                type: string
  /dashboard:
    get:
      summary: Text dashboard
      responses:
        "200":
          description: Plain text operational dashboard
          content:
            text/plain:
              schema:
                type: string
