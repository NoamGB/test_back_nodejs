version: '3'
services:
  api:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - redis

  worker:
    build: .
    command: npm run worker
    depends_on:
      - redis
      - mongo

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  redis:
    image: redis
    ports:
      - "6379:6379"